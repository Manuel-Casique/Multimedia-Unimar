services:

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - backend
      - frontend
    networks:
      - unimar

  backend:
    image: ghcr.io/${GITHUB_OWNER}/unimar-backend:latest
    env_file: .env.backend
    volumes:
      - storage:/app/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - unimar

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/unimar-frontend:latest
    env_file: .env.frontend
    networks:
      - unimar

  mysql:
    image: mysql:8
    env_file: .env.mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - unimar

  redis:
    image: redis:7-alpine
    networks:
      - unimar

volumes:
  mysql_data:
  storage:
  caddy_data:

networks:
  unimar:
    driver: bridge
